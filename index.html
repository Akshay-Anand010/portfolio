<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Akshay Anand — Sr. Software Engineer</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #060C18;
      --bg-card: #0C1525;
      --bg-card-hover: #111E35;
      --border: rgba(99,102,241,0.18);
      --border-subtle: rgba(255,255,255,0.07);
      --accent: #6366F1;
      --accent-glow: rgba(99,102,241,0.18);
      --accent-soft: #818CF8;
      --accent2: #06B6D4;
      --text: #E2E8F0;
      --text-muted: #64748B;
      --text-dim: #94A3B8;
      --green: #34D399;
      --mono: 'JetBrains Mono', monospace;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; overflow-x: hidden; }

    #three-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.1rem 2.5rem;
      background: rgba(6,12,24,0.88); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-subtle);
    }
    .nav-logo { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 1.1rem; color: var(--text); letter-spacing: -0.02em; }
    .nav-logo span { color: var(--accent); }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { font-family: var(--mono); font-size: 0.72rem; color: var(--text-muted); text-decoration: none; letter-spacing: 0.06em; transition: color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--accent-soft); }

    /* LAYOUT */
    .container { max-width: 960px; margin: 0 auto; padding: 0 2rem; position: relative; z-index: 1; }
    section { padding: 6rem 0; }
    .eyebrow { font-family: var(--mono); font-size: 0.68rem; letter-spacing: 0.18em; color: var(--accent); text-transform: uppercase; margin-bottom: 0.85rem; }
    .section-title { font-family: 'Space Grotesk', sans-serif; font-size: clamp(1.6rem, 3vw, 2.2rem); font-weight: 700; letter-spacing: -0.03em; color: var(--text); margin-bottom: 0.5rem; }
    .section-sub { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 3rem; max-width: 520px; line-height: 1.7; }
    .section-rule { width: 100%; height: 1px; background: linear-gradient(90deg, var(--accent-glow), transparent); margin-bottom: 3.5rem; }

    /* HERO */
    #hero { min-height: 100vh; display: flex; align-items: center; padding-top: 80px; }
    .hero-status {
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: rgba(52,211,153,0.08); border: 1px solid rgba(52,211,153,0.22);
      border-radius: 100px; padding: 0.35rem 0.9rem; margin-bottom: 1.75rem;
    }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity:1; box-shadow:0 0 0 0 rgba(52,211,153,0.4); } 50% { opacity:0.8; box-shadow:0 0 0 6px rgba(52,211,153,0); } }
    .status-text { font-family: var(--mono); font-size: 0.68rem; color: var(--green); letter-spacing: 0.06em; }
    .hero-name { font-family: 'Space Grotesk', sans-serif; font-size: clamp(3rem, 7vw, 5.2rem); font-weight: 700; letter-spacing: -0.04em; line-height: 1.0; margin-bottom: 0.9rem; }
    .hero-name .line2 { color: var(--accent); }
    .hero-title { font-family: 'Space Grotesk', sans-serif; font-size: 1.05rem; font-weight: 400; color: var(--text-dim); margin-bottom: 1.4rem; }
    .hero-title strong { color: var(--accent-soft); font-weight: 600; }
    .hero-bio { font-size: 0.92rem; color: var(--text-muted); max-width: 560px; line-height: 1.8; margin-bottom: 2.25rem; }
    .hero-cta { display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; }
    .btn-primary {
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: var(--accent); color: #fff; padding: 0.7rem 1.5rem;
      border-radius: 8px; text-decoration: none; font-size: 0.85rem; font-weight: 500;
      transition: all 0.2s; box-shadow: 0 4px 20px var(--accent-glow);
    }
    .btn-primary:hover { background: var(--accent-soft); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(99,102,241,0.35); }
    .btn-ghost {
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: transparent; color: var(--text-dim); padding: 0.7rem 1.4rem;
      border-radius: 8px; border: 1px solid var(--border-subtle);
      text-decoration: none; font-size: 0.85rem; font-weight: 500; transition: all 0.2s;
    }
    .btn-ghost:hover { border-color: var(--border); color: var(--accent-soft); background: var(--accent-glow); }
    
    /* AI SEARCH ENGINE COMPONENT */
    .ai-search-widget {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-top: 2rem;
      box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
      position: relative;
    }
    .ai-search-widget::before {
      content: ''; position: absolute; inset: 0; border-radius: 12px;
      padding: 1px; background: linear-gradient(135deg, var(--accent), transparent, var(--accent2));
      -webkit-mask: linear-gradient(#fff #fff) content-box, linear-gradient(#fff #fff);
      -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none; opacity: 0.4;
    }
    .ai-widget-title {
      font-family: 'Space Grotesk', sans-serif; font-size: 0.95rem; font-weight: 600;
      color: var(--text); margin-bottom: 0.35rem; display: flex; align-items: center; gap: 0.5rem;
    }
    .ai-widget-desc { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 1rem; }
    .ai-search-form { display: flex; gap: 0.6rem; }
    .ai-search-input {
      flex: 1; background: rgba(6,12,24,0.6); border: 1px solid var(--border-subtle);
      border-radius: 6px; padding: 0.65rem 1rem; color: var(--text); font-family: var(--mono);
      font-size: 0.8rem; outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .ai-search-input:focus { border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }
    .ai-search-btn {
      background: var(--accent); color: #fff; border: none; border-radius: 6px;
      padding: 0 1.2rem; font-family: var(--mono); font-size: 0.75rem; font-weight: 500;
      cursor: pointer; transition: background 0.2s, transform 0.1s;
    }
    .ai-search-btn:hover { background: var(--accent-soft); }
    .ai-search-btn:disabled { background: var(--text-muted); cursor: not-allowed; }
    .ai-output-box {
      display: none; margin-top: 1.2rem; padding: 1rem; background: rgba(6,12,24,0.4);
      border-left: 3px solid var(--accent); border-radius: 0 6px 6px 0;
    }
    .ai-output-text { font-size: 0.84rem; color: var(--text-dim); line-height: 1.6; white-space: pre-wrap; }

    .stats-row { display: flex; gap: 2rem; margin-top: 2.5rem; padding-top: 2rem; border-top: 1px solid var(--border-subtle); flex-wrap: wrap; }
    .stat { display: flex; flex-direction: column; gap: 0.15rem; }
    .stat-num { font-family: 'Space Grotesk', sans-serif; font-size: 1.8rem; font-weight: 700; color: var(--text); letter-spacing: -0.04em; }
    .stat-num span { color: var(--accent); }
    .stat-label { font-family: var(--mono); font-size: 0.65rem; color: var(--text-muted); letter-spacing: 0.06em; text-transform: uppercase; }

    /* SKILLS */
    .skills-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 1rem; }
    .skill-card { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 12px; padding: 1.35rem 1.5rem; transition: all 0.25s; }
    .skill-card:hover { border-color: var(--border); background: var(--bg-card-hover); transform: translateY(-2px); }
    .skill-card-label { font-family: var(--mono); font-size: 0.63rem; letter-spacing: 0.12em; color: var(--accent); text-transform: uppercase; margin-bottom: 0.85rem; }
    .skill-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .tag { font-family: var(--mono); font-size: 0.68rem; color: var(--text-dim); background: rgba(255,255,255,0.04); border: 1px solid var(--border-subtle); padding: 0.22rem 0.6rem; border-radius: 5px; transition: all 0.2s; }
    .tag:hover { border-color: var(--border); color: var(--accent-soft); background: var(--accent-glow); }

    /* EXPERIENCE */
    .timeline { display: flex; flex-direction: column; }
    .timeline-item { display: grid; grid-template-columns: 150px 1px 1fr; gap: 0 1.75rem; padding-bottom: 3rem; }
    .timeline-item:last-child { padding-bottom: 0; }
    .timeline-date { font-family: var(--mono); font-size: 0.67rem; color: var(--text-muted); letter-spacing: 0.03em; padding-top: 0.25rem; text-align: right; line-height: 1.5; }
    .timeline-line { display: flex; flex-direction: column; align-items: center; }
    .timeline-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); border: 2px solid var(--bg); box-shadow: 0 0 0 2px var(--accent), 0 0 12px var(--accent-glow); flex-shrink: 0; margin-top: 0.2rem; }
    .timeline-connector { width: 1px; flex: 1; background: linear-gradient(180deg, var(--accent), transparent); margin-top: 8px; opacity: 0.3; }
    .timeline-item:last-child .timeline-connector { display: none; }
    .timeline-role { font-family: 'Space Grotesk', sans-serif; font-size: 1.05rem; font-weight: 600; color: var(--text); margin-bottom: 0.2rem; }
